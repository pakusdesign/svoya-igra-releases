name: Build distributives

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: "false"
  GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}

jobs:
  windows:
    name: Windows distributives
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Prepare output folders
        run: New-Item -ItemType Directory -Force dist\Windows

      - name: Build and publish Windows
        run: npx electron-builder --win --x64 --publish always

  mac:
    name: Mac distributives
    runs-on: macos-latest
    needs: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Prepare output folders
        run: mkdir -p dist/Mac

      - name: Build and publish Mac
        run: |
          ulimit -n 10240 || true
          ulimit -n
          npx electron-builder --mac --x64 --arm64 --publish always
